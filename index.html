<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love You</title>

<style>
body{
    margin:0;
    background:#000;
    overflow:hidden;
    height:100vh;
}

#ui .love{
    position:absolute;
    top:50%;
    left:50%;
    margin:-225px 0 0 -225px;
}

#ui .love_word{
    color:#ea80b0;
    font-size:1.4rem;
    transform:translateY(-100%) rotateZ(-30deg);
    font-family:Arial,sans-serif;
    text-shadow:0 0 10px #fff;
    letter-spacing:2px;
}

#ui .love:last-child .love_word{
    color:#fff;
    font-size:2rem;
    text-shadow:0 0 15px #ea80b0;
}

.love_horizontal{
    animation:horizontal 10s infinite alternate ease-in-out;
}

.love_vertical{
    animation:vertical 20s infinite linear;
}

@keyframes horizontal{
    from{
        transform:translateX(0);
    }
    to{
        transform:translateX(450px);
    }
}

@keyframes vertical{
    0%{transform:translateY(180px);}
    10%{transform:translateY(45px);}
    18%{transform:translateY(0);}
    25%{transform:translateY(112px);}
    32%{transform:translateY(0);}
    50%{transform:translateY(180px);}
    75%{transform:translateY(450px);}
    100%{transform:translateY(180px);}
}
</style>
</head>

<body>

<div id="ui"></div>

<script>
const ui = document.getElementById("ui");

for(let i=1;i<=100;i++){

    const love=document.createElement("div");
    love.className="love";

    love.innerHTML=`
        <div class="love_horizontal">
            <div class="love_vertical">
                <div class="love_word">
                    ${i===100 ? "I Love You" : "I Love You"}
                </div>
            </div>
        </div>
    `;

    love.querySelector(".love_horizontal").style.animationDelay=`-${i*300}ms`;
    love.querySelector(".love_vertical").style.animationDelay=`-${i*300}ms`;

    ui.appendChild(love);
}
</script>

</body>
</html>
