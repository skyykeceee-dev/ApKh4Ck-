<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NevaaHub V 0.2</title>

<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Orbitron',sans-serif;
background:linear-gradient(135deg,#000,#222,#444);
min-height:100vh;
color:white;
}

/* LOGIN */

.login-screen{
position:fixed;
inset:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.login-box{
width:350px;
padding:25px;
background:#111;
border-radius:20px;
border:2px solid #00ffff;
box-shadow:0 0 25px #00ffff;
text-align:center;
}

.login-box img{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
border:3px solid #ff0000;
margin-bottom:15px;
}

.login-box h2{
margin-bottom:15px;
color:#00ffff;
}

.login-box input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
}

.login-btn{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
cursor:pointer;
background:#00ffff;
font-weight:bold;
}

#loginMsg{
margin-top:10px;
color:#ff4444;
}

/* DASHBOARD */

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.profile-box{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
border-radius:15px;
border:2px solid #00ffff;
box-shadow:0 0 20px #00ffff;
margin-top:20px;
}

.profile-left{
display:flex;
align-items:center;
gap:15px;
}

.profile-left img{
width:70px;
height:70px;
border-radius:50%;
object-fit:cover;
border:2px solid red;
}

.online{
color:#00ff00;
font-weight:bold;
}

.time{
font-size:13px;
color:#ccc;
margin-top:5px;
}

.menu-box{
margin-top:20px;
padding:25px;
border-radius:20px;
border:2px solid #ff00ff;
box-shadow:0 0 25px #ff00ff;
}

.title-row{
display:flex;
justify-content:center;
align-items:center;
gap:15px;
}

.title{
font-family:'Creepster',cursive;
font-size:45px;
}

.subtitle{
text-align:center;
color:#00ffff;
margin-bottom:15px;
}

.spin{
font-size:30px;
animation:spin 2s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

.line{
height:2px;
background:#00ffff;
margin:15px 0;
}

label{
display:block;
margin-top:15px;
}

input,select{
width:100%;
padding:12px;
margin-top:5px;
border:none;
border-radius:10px;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.unlock{
background:#00aa00;
color:white;
}

.enter{
background:#ff0000;
color:white;
}

.eye{
font-size:90px;
text-align:center;
margin-top:20px;
animation:blink 3s infinite;
text-shadow:
0 0 10px red,
0 0 20px blue,
0 0 35px blue;
}

@keyframes blink{
0%,90%,100%{opacity:1;}
95%{opacity:.1;}
}

.footer{
position:fixed;
left:10px;
bottom:10px;
color:#ffff00;
font-size:12px;
}

/* MODAL */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:none;
justify-content:center;
align-items:center;
}

.modal-content{
background:#111;
padding:25px;
border-radius:15px;
text-align:center;
border:2px solid white;
min-width:300px;
}

.modal-content button{
width:auto;
padding:10px 20px;
}

</style>
</head>
<body>

<div class="login-screen" id="loginScreen">

<div class="login-box">

<img src="1000744995.jpg">

<h2>NEVAAHUB LOGIN</h2>

<input type="text" id="loginUser" placeholder="Username">

<input type="password" id="loginPass" placeholder="Password">

<button class="login-btn" onclick="checkLogin()">LOGIN</button>

<p id="loginMsg"></p>

</div>

</div>

<div class="container">

<div class="profile-box">

<div class="profile-left">

<img src="1000744995.jpg">

<div>
<h3>Hai User, NevaaHub</h3>
<div class="time" id="clock"></div>
</div>

</div>

<div class="online">ONLINE</div>

</div>

<div class="menu-box">

<div class="title-row">

<div class="spin">✦</div>

<div>
<div class="title">MOD MENU</div>
<div class="subtitle">BY NEVAAHUB</div>
</div>

<div class="spin">✦</div>

</div>

<div class="line"></div>

<label>Masukkan Nomor Target :</label>
<input type="text" id="nomor" maxlength="11" placeholder="08xxxxxxxxx">

<label>BUG FREE</label>
<select id="opsi">
<option>Spam</option>
<option>Buyar Kontak</option>
</select>

<label>BUG PREMIUM</label>
<select id="premium" disabled>
<option value="">Terkunci</option>
<option>Reset☠ </option>
<option>Freeze☠ </option>
</select>

<label>Key Locked</label>
<input type="password" id="unlockPass">

<button class="unlock" onclick="unlockPremium()">
Unlock Key
</button>

<button class="enter" onclick="submitForm()">
☠Launch Bug☠  
</button>

<div class="eye">👁</div>

</div>

</div>

<div class="footer">
NevaaHub V 0.2
</div>

<div class="modal" id="modal">
<div class="modal-content">

<h2 id="modalTitle"></h2>

<p id="modalText"></p>

<button id="okBtn" onclick="closeModal()">
OKE
</button>

</div>
</div>

<script>

function checkLogin(){

let user=document.getElementById("loginUser").value;
let pass=document.getElementById("loginPass").value;

if(user==="Neva" && pass==="hub"){

document.getElementById("loginScreen").style.display="none";

}else{

document.getElementById("loginMsg").innerHTML=
"Username atau Password Salah";

}

}

function updateClock(){

document.getElementById("clock").innerHTML=
new Date().toLocaleString("id-ID");

}

setInterval(updateClock,1000);
updateClock();

document.getElementById("nomor").addEventListener("input",function(){

this.value=this.value.replace(/[^0-9]/g,'');

});

function unlockPremium(){

let pass=document.getElementById("unlockPass").value;

if(pass==="NevaPremium"){

document.getElementById("premium").disabled=false;

showModal(
"✅ UNLOCK",
"Premium berhasil dibuka",
"#00ff66"
);

}else{

showModal(
"❌ PASSWORD SALAH",
"Masukkan password yang benar",
"#ff3333"
);

}

}

function submitForm(){

let nomor=document.getElementById("nomor").value;
let opsi=document.getElementById("opsi").value;

if(nomor.length!==11 || opsi===""){

showModal(
"❌ MAAF COBA LAGI",
"Lengkapi data dengan benar",
"#ff3333"
);

return;
}

showCompleted();

}

function showCompleted(){

let count=5;

document.getElementById("modalTitle").innerHTML=
"✅ COMPLETED";

document.getElementById("modalTitle").style.color=
"#00ff66";

document.getElementById("modalText").innerHTML=
"Menutup dalam "+count+" detik";

document.getElementById("okBtn").style.display=
"none";

document.getElementById("modal").style.display=
"flex";

let timer=setInterval(function(){

count--;

document.getElementById("modalText").innerHTML=
"Menutup dalam "+count+" detik";

if(count<=0){

clearInterval(timer);

document.getElementById("modal").style.display=
"none";

document.getElementById("okBtn").style.display=
"block";

}

},1000);

}

function showModal(title,text,color){

document.getElementById("modalTitle").innerHTML=
title;

document.getElementById("modalTitle").style.color=
color;

document.getElementById("modalText").innerHTML=
text;

document.getElementById("modal").style.display=
"flex";

}

function closeModal(){

document.getElementById("modal").style.display=
"none";

}

document.addEventListener("keydown",function(e){

if(e.key==="Enter"){

if(document.getElementById("loginScreen").style.display!=="none"){

checkLogin();

}else{

submitForm();

}

}

});

</script>

</body>
</html>
